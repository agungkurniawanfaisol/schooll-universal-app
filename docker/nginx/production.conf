# Production nginx example — serve React build + proxy API to Laravel
# Copy to your server and adjust server_name / paths.

server {
    listen 80;
    server_name your-school-domain.test;
    client_max_body_size 50M;

    root /var/www/schooll-universal-app/frontend/dist;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage {
        alias /var/www/schooll-universal-app/backend/storage/app/public;
    }

    location /robots.txt {
        proxy_pass http://127.0.0.1:8000/robots.txt;
    }

    location /sitemap.xml {
        proxy_pass http://127.0.0.1:8000/sitemap.xml;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
