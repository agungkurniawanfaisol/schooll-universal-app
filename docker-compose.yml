services:
  nginx:
    image: nginx:1.27-alpine
    container_name: sekolah-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sekolah-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sekolah-backend
    working_dir: /var/www/backend
    expose:
      - "8000"
    volumes:
      - ./backend:/var/www/backend
      - vendor_data:/var/www/backend/vendor
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sekolah_cms}
      DB_USERNAME: ${DB_USERNAME:-sekolah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sekolah-network
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: >
      sh -c "
        if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi &&
        php artisan config:clear &&
        php artisan migrate --force --no-interaction 2>/dev/null || true &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sekolah-frontend
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - node_modules_data:/app/node_modules
    environment:
      VITE_DEV_API_PROXY: http://backend:8000
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sekolah-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  mysql:
    image: mysql:8.0
    container_name: sekolah-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-sekolah_cms}
      MYSQL_USER: ${DB_USERNAME:-sekolah}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - sekolah-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: sekolah-phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-sekolah}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sekolah-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: sekolah-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - sekolah-network

networks:
  sekolah-network:
    driver: bridge

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
